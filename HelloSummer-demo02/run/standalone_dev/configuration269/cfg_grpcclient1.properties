############################################################################################################################################################################################################################
# 1. gRpc.client provider                                                                                                                                                                                                  #
# Scenario 1 (overrideAuthority not needed): In a well-configured environment, each node's DNS name is listed as a Subject Alternative Name (SAN) in the certificate, so TLS verification succeeds without any override.   #
# Example: 3-node gRPC cluster, certificate SANs cover every node's individual DNS name:                                                                                                                                   #
#   Subject: CN=grpc.mycompany.com                                                                                                                                                                                         #
#   Subject Alternative Names:                                                                                                                                                                                             #
#     DNS: grpc.cluster.mycompany.com     <- cluster VIP / load balancer, shared DNS name used for TLS verification across all nodes                                                                                       #
#     DNS: grpc-node1.mycompany.com       <- node 1                                                                                                                                                                        #
#     DNS: grpc-node2.mycompany.com       <- node 2                                                                                                                                                                        #
#     DNS: grpc-node3.mycompany.com       <- node 3                                                                                                                                                                        #
#                                                                                                                                                                                                                          #
#   gRpc.client.ssl.overrideAuthority is not required                                                                                                                                                                      #
#                                                                                                                                                                                                                          #
# Scenario 2 (overrideAuthority required): When nodes share a certificate that does not list each node's DNS name individually, set overrideAuthority to a shared SAN so TLS verification succeeds for all nodes.          #
# Example: N-node gRPC cluster, certificate SANs include a shared cluster DNS name in addition to per-node names:                                                                                                          #
#   Subject: CN=grpc.mycompany.com                                                                                                                                                                                         #
#   Subject Alternative Names:                                                                                                                                                                                             #
#     DNS: grpc.cluster.mycompany.com     <- cluster VIP / load balancer, shared DNS name used for TLS verification across all nodes                                                                                       #
#     DNS: grpc-node-n.mycompany.com      <- each node's own DNS name (not used for TLS verification)                                                                                                                      #
#                                                                                                                                                                                                                          #
#   gRpc.client.ssl.overrideAuthority = grpc.cluster.mycompany.com                                                                                                                                                         #
############################################################################################################################################################################################################################
# Note: cluster target
# [Format] server1:port1, server2:port2, ..., serverN:portN
# [Example] grpc-node1.mycompany.com:8424, grpc-node2.mycompany.com:8424, grpc-node3.mycompany.com:8424
gRpc.client.LoadBalancing.servers=0.0.0.0:8424, 0.0.0.0:8425

# Note: In case you have more than one gRPC client needs to connect to different gRPC services, you can set this to distinguish them
#gRpc.client.LoadBalancing.scheme=grpc

# Note: available options: ROUND_ROBIN, PICK_FIRST
#gRpc.client.LoadBalancing.policy=ROUND_ROBIN

# Note: non-cluster server target
# [Format] scheme://host:port
# [Example] grpc:///
# [Example] grpc://127.0.0.1:8424
# [Example] unix:/tmp/grpcsrver.socket
#gRpc.client.target.url=grpc:///

# Note: Valid values: TLSv1.2, TLSv1.3. Use plaintext socket no SSL/TLS when specified as blank
#gRpc.client.ssl.Protocols=TLSv1.3
#gRpc.client.ssl.ciphers=

# Note: ssl provider: OPENSSL (default), OPENSSL_REFCNT,  JDK
#gRpc.client.ssl.Provider=OPENSSL


###########################
# 2. gRpc.client keystore #
###########################
# Note: Path to key store file. Use JDK default keystore when not specified
gRpc.client.ssl.KeyStore=keystore.p12
gRpc.client.ssl.KeyStorePwd=ENC(yGPIt3emUUzDt1lJ5gQcXhXVZbYKPKDVCW3VtO1E9eXG/vz5OsOhIbFmVc12e2tQ3482zw==)
gRpc.client.ssl.KeyAlias=server3_4096.jexpress.org
gRpc.client.ssl.KeyPwd=ENC(A4LSLQV1UgvA+c5rFgx1jXoHhxexs0yKVaE6ukK5a8K5X61Doyzs9G2GuCyy8nVT/vvhNg==)


#############################
# 3. gRpc.client truststore #
#############################
# Note: Path to trust store file. Use JDK default truststore when not specified
gRpc.client.ssl.TrustStore=truststore_grpc_client.p12
gRpc.client.ssl.TrustStorePwd=ENC(SDx40NxFwVYJQSxul10S1oVNbCOsNUZUOHvnbwCb/0DvXsu3l1CA69dM9HjUWLOBGMHO/Q==)

# Note: Common use cases in Scenario 2: connecting via IP address, an internal alias, or a cluster VIP where the server certificate is issued for a specific DNS name not listed as a Subject Alternative Name (SAN) of the connection address.
#gRpc.client.ssl.overrideAuthority=

# Note: Only used when trust store is not specified, available options: JDK (use JDK truststore), TrustAll (no cert verification and insecure)
#gRpc.client.ssl.TrustStore.Default=JDK


##############################################################################################
# 4. gRpc.client Channel Settings                                                            #
# The following settings are for NettyChannelBuilder, which is used to create a gRPC channel #
##############################################################################################
# Note: string: default null
#gRpc.client.channel.userAgent=

# Note: int: default 4194304 if not set
#gRpc.client.channel.maxInboundMessageSize=

# Note: int: default 8192 if not set
#gRpc.client.channel.maxHeaderListSize=

# Note: long: default 1048576L if not set
#gRpc.client.channel.perRpcBufferLimit=

# Note: int: default 5 if not set
#gRpc.client.channel.maxHedgedAttempts=

# Note: long: default 1800 (30 minutes) if not set
#gRpc.client.channel.idleTimeoutSeconds=

# Note: boolean: default false if not set. keepAliveWithoutCalls is used when you are willing to spend client, server, and network resources to have lower latency for very infrequent RPCs
#gRpc.client.channel.keepAliveWithoutCalls=

# Note: long: default Long.MAX_VALUE (never) if not set. The interval in seconds between PING frames.
#gRpc.client.channel.keepAliveTimeSeconds=

# Note: long: default 20 seconds if not set. The timeout in seconds for a PING frame to be acknowledged. If sender does not receive an acknowledgment within this time, it will close the connection.
#gRpc.client.channel.keepAliveTimeoutSeconds=

# Note: boolean: default true if not set
#gRpc.client.channel.retryEnabled=

# Note: int: default 5 if not set
#gRpc.client.channel.maxRetryAttempts=

# Note: int: default 16777216L if not set
#gRpc.client.channel.retryBufferSize=
