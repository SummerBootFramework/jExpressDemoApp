##############################
# 2. HTTP Client Performance #
##############################

# Note: The maximum time to wait for only the connection to be established, should be less than httpclient.timeout.ms
#httpclient.timeout.connect.ms=3000

# Note: The maximum time to wait from the beginning of the connection establishment until the server sends data back, this is the end-to-end timeout.
#httpclient.timeout.ms=5000

# Note: valid value = VirtualThread (default for Java 21+), CPU, IO and Mixed (default for old Java)
# Note:  use CPU core + 1 when application is CPU bound
# Note: use CPU core x 2 + 1 when application is I/O bound
# Note: need to find the best value based on your performance test result when nio.server.BizExecutor.mode=Mixed
#httpclient.executor.mode=VirtualThread

# Note: CoreSize 0 = current computer/VM's available processors x 2 + 1
httpclient.executor.CoreSize=0

# Note: MaxSize 0 = current computer/VM's available processors x 2 + 1
httpclient.executor.MaxSize=0

# Note: The waiting list size when the pool is full
#httpclient.executor.QueueSize=2147483647
#httpclient.executor.KeepAliveSec=60
#httpclient.executor.prestartAllCoreThreads=false
#httpclient.executor.allowCoreThreadTimeOut=false


