####################
# 1. SMTP Settings #
####################
# Note: The SMTP server to connect to. i.e. Gmail server: smtp.gmail.com
#mail.smtp.host=

# Note: 25: The original standard SMTP port
# Note: 587: The standard secure SMTP port
#mail.smtp.port=25

# Note: Whether to attempt to authenticate the user using the AUTH command
#mail.smtp.auth=

# Note: To inform the email server that the email client wants to upgrade from an insecure connection to a secure one using TLS or SSL
#mail.smtp.starttls.enable=

# Note: Sender email account, also as default username for SMTP when display name is not provided
#mail.smtp.user=

# Note: Sender display name
#mail.smtp.user.displayname=
#mail.smtp.user.passwrod=DEC(plain text inside this DEC() will be automatically encrypted by app root password when the application starts or is running)


################################################
# 2. Alert Recipients                          #
# [Format] CSV format                          #
# [Example] johndoe@test.com, janedoe@test.com #
################################################
# Note: The default alert email recipients
#email.to.AppSupport=

# Note: use AppSupport if not provided
#email.to.Development=

# Note: use AppSupport if not provided
#email.to.ReportViewer=

# Note: Alert message with the same subject will not be sent out within this minutes (default 30)
#debouncing.emailalert_minute=30

# Note: Backoff strategy, unit = millisecond), strategy = {LINEAR, EXPONENTIAL}, In exponential mode, factor is growth multiplier; in linear mode, factor is step. Unlimited attempts when maxAttempts <= 0
#debouncing.emailalert.BackoffStrategy={"strategy":"LINEAR","timeUnit":"MINUTES","initialInterval":30,"factor":5.0,"maxInterval":60,"maxAttempts":0,"jitterFactor":0.05}
